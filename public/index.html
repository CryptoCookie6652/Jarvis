<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>JARVIS</h1>
    <div id="gauge" title="Max plan five-hour window">rate limit: —</div>
  </header>

  <details id="dispatch-panel">
    <summary>Dispatch a worker</summary>
    <form id="dispatch-form">
      <label>Task name <input name="task" placeholder="what is this run called" /></label>
      <label>Working directory <input name="cwd" required /></label>
      <label>Prompt <textarea name="prompt" rows="4" required placeholder="what should the worker do"></textarea></label>
      <label class="row"><input type="checkbox" name="allowWrite" /> allow file writes (Write/Edit)</label>
      <button type="submit">Dispatch</button>
      <span id="dispatch-status"></span>
    </form>
  </details>

  <main>
    <section id="chat-section">
      <h2>Conductor</h2>
      <div id="chat"></div>
      <form id="chat-form">
        <textarea name="text" rows="2" placeholder="Talk to Jarvis… (Enter to send)" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
    <section>
      <h2>Agents</h2>
      <div id="cards"></div>
    </section>
    <section>
      <h2>Live feed</h2>
      <div id="feed"></div>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
