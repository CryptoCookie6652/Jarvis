<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jarvis</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>JARVIS</h1>
    <div id="gauge" title="Max plan five-hour window">rate limit: —</div>
  </header>

  <div id="voice-bar">
    <button id="mic-toggle" type="button">🎙 off</button>
    <button id="mute-toggle" type="button" title="Toggle Jarvis speech">🔊</button>
    <label class="hp" title="Keeps the mic hot while Jarvis speaks — only safe on headphones">
      <input type="checkbox" id="headphones-mode" /> headphones
    </label>
    <select id="voice-select" title="Jarvis voice"></select>
    <select id="voice-lang" title="Recognition language">
      <option>en-US</option><option>en-GB</option><option>de-DE</option>
      <option>fr-FR</option><option>es-ES</option><option>pl-PL</option>
      <option>sv-SE</option><option>nl-NL</option>
    </select>
    <input id="voice-rate" type="range" min="0.7" max="1.4" step="0.05" value="1.05" title="Speech rate" />
    <span id="voice-status">mic off</span>
    <span id="voice-hearing"></span>
  </div>

  <details id="dispatch-panel">
    <summary>Dispatch a worker</summary>
    <form id="dispatch-form">
      <label>Task name <input name="task" placeholder="what is this run called" /></label>
      <label>Working directory <input name="cwd" required /></label>
      <label>Project <input name="project" placeholder="optional project name" /></label>
      <label>Prompt <textarea name="prompt" rows="4" required placeholder="what should the worker do"></textarea></label>
      <label>Agent provider <select name="provider" id="provider-select"></select></label>
      <label class="row"><input type="checkbox" name="allowWrite" /> allow file writes (Write/Edit)</label>
      <button type="submit">Dispatch</button>
      <span id="dispatch-status"></span>
    </form>
  </details>

  <main>
    <section id="chat-section">
      <div class="conductor-heading">
        <h2>Conductor</h2>
        <div class="conductor-controls">
          <div id="identity-switch" class="identity-switch" role="group" aria-label="Choose who acts as Jarvis"></div>
          <label class="model-picker">
            <span>Model</span>
            <select id="conductor-model" aria-label="Jarvis model version"></select>
          </label>
          <label class="effort-picker">
            <span>Effort</span>
            <select id="conductor-effort" aria-label="Jarvis reasoning effort"></select>
          </label>
          <button id="reset-chat" type="button" title="Start a fresh conversation for the active Jarvis identity">↺ new</button>
        </div>
      </div>
      <div id="chat"></div>
      <form id="chat-form">
        <textarea name="text" rows="2" placeholder="Talk to Jarvis… (Enter to send)" required></textarea>
        <button type="submit">Send</button>
      </form>
    </section>
    <section id="workspace-section">
      <nav class="workspace-tabs" aria-label="Workspace views">
        <button type="button" class="workspace-tab active" data-workspace-view="projects">Projects</button>
        <button type="button" class="workspace-tab" data-workspace-view="agents">Agents</button>
      </nav>
      <div id="projects-view" class="workspace-view">
        <form id="project-form" class="project-form">
          <input name="name" aria-label="Project name" placeholder="Project name" required />
          <input name="cwd" aria-label="Project directory" placeholder="C:\path\to\project" required />
          <button type="submit">Add project</button>
          <span id="project-status"></span>
        </form>
        <div id="project-list"></div>
      </div>
      <div id="agents-view" class="workspace-view" hidden>
        <div id="project-tabs"></div>
        <div id="cards"></div>
        <details id="tasks-panel" open>
          <summary>Tasks <span id="task-progress"></span></summary>
          <div id="tasks"></div>
        </details>
      </div>
    </section>
    <section>
      <h2>Live feed</h2>
      <div id="feed"></div>
      <details id="skills-panel">
        <summary>Skills</summary>
        <div id="skills"></div>
      </details>
    </section>
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
